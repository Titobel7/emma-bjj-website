<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emma BJJ — Road To #1</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#000;
      color:white;
      text-align:center;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    h1{
      font-size:70px;
      margin:0;
    }

    h2{
      color:#facc15;
      letter-spacing:4px;
    }

    p{
      max-width:700px;
      line-height:1.7;
      color:#ccc;
      font-size:20px;
    }

    .btn{
      margin-top:30px;
      padding:16px 32px;
      background:#facc15;
      color:black;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      display:inline-block;
    }

    .stats{
      display:flex;
      gap:20px;
      margin-top:50px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      background:#111;
      padding:30px;
      border-radius:20px;
      min-width:180px;
    }

    .card h3{
      font-size:40px;
      margin:0;
      color:#facc15;
    }

    @media(max-width:768px){
      h1{
        font-size:45px;
      }

      p{
        font-size:18px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <h2>ROAD TO #1</h2>

    <h1>Emma BJJ</h1>

    <p>
      Born To Fight. Trained To Win.
      <br><br>
      Nº1 del ranking nacional AJP España.
      Competidora de Brazilian Jiu-Jitsu
      en categoría Gray Belt -36kg.
    </p>

    <a class="btn" href="https://instagram.com/emma17bjj" target="_blank">
      Follow @emma17bjj
    </a>

    <div class="stats">

      <div class="card">
        <h3>20</h3>
        <span>Medallas</span>
      </div>

      <div class="card">
        <h3>13</h3>
        <span>Oros</span>
      </div>

      <div class="card">
        <h3>#1</h3>
        <span>Ranking AJP</span>
      </div>

    </div>

  </section>

</body>
</html>
